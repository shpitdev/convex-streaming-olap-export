name: semgrep

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: 01-semgrep-oss-scan
    runs-on: ubuntu-24.04
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config auto
