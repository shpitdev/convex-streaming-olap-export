resources:
  jobs:
    convex_delta_extract:
      name: ${var.job_name}
      max_concurrent_runs: 1
      tasks:
        - task_key: convex_delta_extract
          spark_python_task:
            python_file: ${workspace.file_path}/extractor/convex_cdc_job.py
            source: WORKSPACE
            parameters:
              - --deployment-url
              - ${var.convex_deployment_url}
              - --deploy-key-secret-scope
              - ${var.convex_deploy_key_secret_scope}
              - --deploy-key-secret-key
              - ${var.convex_deploy_key_secret_key}
              - --source-id
              - ${var.source_id}
              - --table-name
              - ${var.table_name}
              - --catalog
              - ${var.catalog}
              - --control-schema
              - ${var.control_schema}
              - --bronze-schema
              - ${var.bronze_schema}
              - --checkpoint-table
              - ${var.checkpoint_table}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - requests
