bundle:
  name: convex-sync-kit-delta
  uuid: 2d5d8d8e-cdb2-41e4-bc7e-7ffae07f628d

include:
  - resources/*.yml

sync:
  include:
    - generated/*.sql

variables:
  source_slug:
    description: Stable source slug used for deployment names and workspace paths.
  deployment_slug:
    description: Unique deployment slug for this source and target environment.
  job_name:
    description: Databricks job name for the extractor deployment.
  convex_deployment_url:
    description: Convex deployment root URL.
  convex_deploy_key_secret_scope:
    description: Databricks secret scope that stores the Convex deploy key.
  convex_deploy_key_secret_key:
    description: Secret key name inside the Databricks secret scope.
  source_id:
    description: Source identifier stored in the checkpoint table.
  table_name:
    description: Optional table filter for smoke/debug runs.
  catalog:
    description: Unity Catalog catalog that owns control and bronze tables.
  control_schema:
    description: Schema that owns the checkpoint table.
  bronze_schema:
    description: Schema that owns bronze CDC tables.
  silver_schema:
    description: Schema that owns silver current-state tables.
  checkpoint_table:
    description: Checkpoint table name.
  autocdc_pipeline_name:
    description: Databricks Lakeflow pipeline name for bronze-to-silver AUTO CDC.
  autocdc_pipeline_file:
    description: Generated SQL file name for the Lakeflow AUTO CDC pipeline.

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: DEFAULT
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${var.deployment_slug}
    variables:
      source_slug: meshix-api
      deployment_slug: meshix-api-dev
      job_name: convex-sync-kit-meshix-api-dev-delta-extract
      convex_deploy_key_secret_scope: convex-sync-kit-meshix-api
      convex_deploy_key_secret_key: convex-deploy-key
      source_id: meshix-api-dev
      table_name: ""
      catalog: workspace
      control_schema: convex_sync_kit_meshix_api_delta_control
      bronze_schema: convex_sync_kit_meshix_api_delta_bronze
      silver_schema: convex_sync_kit_meshix_api_delta_silver
      checkpoint_table: connector_checkpoint
      autocdc_pipeline_name: convex-sync-kit-meshix-api-dev-autocdc
      autocdc_pipeline_file: meshix-api-dev-bronze-to-silver.sql
  prod:
    mode: production
    workspace:
      profile: DEFAULT
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${var.deployment_slug}
    variables:
      source_slug: meshix-api
      deployment_slug: meshix-api-prod
      job_name: convex-sync-kit-meshix-api-prod-delta-extract
      convex_deploy_key_secret_scope: convex-sync-kit-meshix-api
      convex_deploy_key_secret_key: convex-deploy-key
      source_id: meshix-api
      table_name: ""
      catalog: workspace
      control_schema: convex_sync_kit_meshix_api_delta_control
      bronze_schema: convex_sync_kit_meshix_api_delta_bronze
      silver_schema: convex_sync_kit_meshix_api_delta_silver
      checkpoint_table: connector_checkpoint
      autocdc_pipeline_name: convex-sync-kit-meshix-api-prod-autocdc
      autocdc_pipeline_file: meshix-api-prod-bronze-to-silver.sql
