# Depot CI Migration
# Source: .github/workflows/ci.yml
#
# Changes made:
# - Changed GitHub runs-on labels to their Depot equivalents

name: CI
on:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  fmt:
    name: Rustfmt
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Run rustfmt
        run: cargo fmt --all --check
  clippy:
    name: Clippy
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    steps:
      - uses: actions/checkout@v4
      - name: Setup Depot
        uses: depot/setup-action@v1
      - name: Install sccache
        run: sudo apt-get update && sudo apt-get install -y sccache
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Run clippy
        run: depot cargo clippy --workspace --all-targets --all-features -- -D warnings
  test:
    name: Test
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    steps:
      - uses: actions/checkout@v4
      - name: Setup Depot
        uses: depot/setup-action@v1
      - name: Install sccache
        run: sudo apt-get update && sudo apt-get install -y sccache
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: depot cargo test --workspace
